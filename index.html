<!DOCTYPE html>
<html lang="en-US">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <meta name="apple-mobile-web-app-status-bar-style" content="transparent">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#fff">
  <meta name="msapplication-navbutton-color" content="#fff">
  <meta name="apple-mobile-web-app-title" content="HTML">
  <meta name="application-name" content="HTML">
  <meta name="msapplication-TileColor" content="#fff">
  <meta name="msapplication-TileImage" content="icon.png">
  <meta name="msapplication-config" content="browserconfig.xml">
  <meta name="description" content="HTML">
  <title>HTML</title>
  <link rel='manifest' href='manifest.json'>

  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="any" href="icon.png">

</head>

<body id="root" class="hide-code">
  <iframe id="display" srcdoc="" allowtransparency="true"></iframe>
  <!-- <div id="display"></div> -->
  <textarea id="code"></textarea>
  <footer>
  </footer>

  <script>
    const body = document.getElementById('root');
    const display = document.getElementById('display');
    const code = document.getElementById('code');

    let count = 0;
    let timer;

    function registerClick() {
      console.log('click');
      count++;
      clearTimeout(timer);

      timer = setTimeout(() => {
        if (count === 4) toggleCode();
        count = 0;
      }, 400);
    }

    body.addEventListener('click', registerClick);

    display.addEventListener('load', () => {
      if (display.contentDocument) {
        display.contentDocument.addEventListener('click', registerClick);
      }
    });

    function toggleCode() {
      body.classList.toggle('hide-code');
    }

    function setLocal(name, value) {
      localStorage.setItem(name, JSON.stringify(value));
    }

    function getLocal(name) {
      return JSON.parse(localStorage.getItem(name));
    }

    code.addEventListener('input', () => {
      setLocal('code', code.value);
      display.srcdoc = getLocal('code');
    });

    window.addEventListener('load', () => {
      code.value = getLocal('code') || '';
      display.srcdoc = code.value;
    });

    // if ("serviceWorker" in navigator) {
    //   if (navigator.serviceWorker.controller) {
    //     console.log("[PWA Builder] active service worker found, no need to register");
    //   } else {
    //     navigator.serviceWorker
    //       .register("pwabuilder-sw.js", {
    //         scope: "./"
    //       })
    //       .then(function (reg) {
    //         console.log("[PWA Builder] Service worker has been registered for scope: " + reg.scope);
    //       });
    //   }
    // }

    function loadHTML() {
      var x = document.getElementById("code-text").value;
      document.getElementById("show-output").srcdoc = x;
    }
  </script>



  <style>
    *,
    *:before,
    *:after {
      font-family: monospace;
      word-wrap: break-word;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      color: inherit;
      line-height: inherit;
      transition: all 1s ease;
    }

    .bg-dark {
      background: #333;
    }

    .bg-black {
      background: #000;
    }

    html,
    body {
      background: transparent;
    }

    body.hide-code #code {
      height: 0;
      padding: 0;
      z-index: -1;
      visibility: hidden;
    }

    #code {
      display: block;
      width: 80%;
      height: 80vh;
      font-family: monospace;
      font-size: small;
      padding: 0.6em;
      position: absolute;
      bottom: 0;
      z-index: 99;
      margin: 1em;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
    }

    footer button {
      position: fixed;
      font-size: 1em;
      bottom: 0;
      right: 0;
      margin: 1em;
      padding: 0.5em;
      z-index: 999;
      opacity: 0;
    }
  </style>

</body>

</html>
