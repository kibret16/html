<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HTML Editor</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: all 0.2s ease;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f0f0f5;
    }

    body.hide-code #editor {
      opacity: 0;
      pointer-events: none;
      transform: translateY(1em);
    }

    #display {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    #editor {
      position: absolute;
      bottom: 1em;
      left: 1em;
      right: 1em;
      height: 80vh;
      z-index: 10;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(1.5em);
      -webkit-backdrop-filter: blur(1.5em);
      border-radius: 1em;
      box-shadow: 0 0.5em 1.5em rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 0.5em;
      padding: 0.5em;
      background: rgba(255, 255, 255, 0.5);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    #toolbar button {
      background: rgba(255, 255, 255, 0.8);
      color: #007aff;
      border: none;
      padding: 0.5em 1em;
      border-radius: 0.5em;
      cursor: pointer;
      font-size: 0.9em;
      font-weight: 600;
      box-shadow: 0 0.1em 0.3em rgba(0, 0, 0, 0.05);
    }

    #toolbar button:active {
      transform: scale(0.95);
      background: #e5e5ea;
    }

    #code {
      flex-grow: 1;
      border: none;
      padding: 1em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.9em;
      resize: none;
      background: transparent;
      outline: none;
      color: #1c1c1e;
    }
  </style>
</head>

<body class="hide-code">
  <iframe id="display" allowtransparency="true"></iframe>
  <div id="editor">
    <div id="toolbar">
      <button id="btn-format" title="Format: 4 to 2 spaces">Format</button>
      <button id="btn-close" title="Close">Close</button>
    </div>
    <textarea id="code" placeholder="Type HTML here..."></textarea>
  </div>
  <script>
    const body = document.body;
    const display = document.getElementById('display');
    const code = document.getElementById('code');
    let count = 0, timer;

    const updateDisplay = () => {
      localStorage.setItem('code', code.value);
      display.srcdoc = `<style>body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}</style>${code.value}`;
    };

    const registerClick = () => {
      count++;
      clearTimeout(timer);
      timer = setTimeout(() => {
        if (count >= 4) body.classList.toggle('hide-code');
        count = 0;
      }, 400);
    };

    document.getElementById('btn-close').onclick = (e) => { e.stopPropagation(); body.classList.add('hide-code'); };
    document.getElementById('btn-format').onclick = (e) => { e.stopPropagation(); code.value = code.value.replace(/ {4}/g, '  '); updateDisplay(); };

    code.oninput = updateDisplay;
    body.onclick = registerClick;
    display.onload = () => display.contentDocument?.addEventListener('click', registerClick);
    window.onload = () => { code.value = localStorage.getItem('code') || ''; updateDisplay(); };

    if ('serviceWorker' in navigator && !navigator.serviceWorker.controller) {
      navigator.serviceWorker.register('pwabuilder-sw.js', { scope: './' }).catch(() => { });
    }
  </script>
</body>

</html>
